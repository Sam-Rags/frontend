<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/config.js"></script>
    <!-- <script src="scripts/details.js"></script> -->
    <script src="scripts/edit.js"></script>
    <title>Home Movies Database</title>
</head>

<body>

<nav class="navigations">
    <h2 class="titleLogo">Home Movie Database</h2>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="add-movies.html">Add Movie</a>
        <a href="browse.html">Browse</a>
    </div>
    
</nav>

<h1>Edit</h1>

<form id="form">
    <div>
        <label for="movieID">ID: </label>
        <input type="text" id="movieID" disabled>
    </div>
    <div>
        <label for="title">Title: </label>
        <input type="text" id="movieTitle" required>
    </div>
    <div>
        <label for="releaseYear">Release Year: </label>
        <input type="text" id="year" size="4">
    </div>
    <div>
        <label for="rating">Rating: </label>
        <select id="rating">
            <option value="blank"></option>
            <option value="G">G</option>
            <option value="PG">PG</option>
            <option value="PG-13">PG-13</option>
            <option value="R">R</option>
            <option value="NR">NR</option>
        </select>
    </div>
    <div>
        <label for="imdbLink">IMDB Link: </label>
        <input type="url" id="imdbLink">
    </div>
    <div>
        <label for="genre">Genre: </label>
        <input type="text" id="genre" placeholder="Action, Comedy...">
    </div>
    <div>
        <label for="description">Description: </label>
        <textarea type="text" id="description" rows="10" cols="30"></textarea>
    </div>
    
    <div>
        <input type="button" id="saveBtn" value="Save Updates">
    </div>
    <div>
        <input type="button" id="deleteBtn" value="Delete Movie">
    </div>
    <div id="error"></div>
</form>


    
<div class="footer">
    <div class="copyright">
        <p>Copyright &#169 2026 Sam Ragsdale</p>
    </div>
</div>
</body>
</html>
