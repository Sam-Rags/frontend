<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/addmovie.js"></script>
    <title>Home Movies Database</title>
</head>

<body>

<nav class="navigations">
    <h2 class="titleLogo">Home Movie Database</h2>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="add-movies.html">Add Movie</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<h1>Add Movie</h1>

<form>
    <div>
        <label for="title">Title: </label>
        <input type="text" id="movieTitle" required>
    </div>
    <div>
        <label for="releaseYear">Release Year: </label>
        <input type="text" id="year">
    </div>
    <div>
        <label for="rating">Rating: </label>
        <select id="rating">
            <option value="blank"></option>
            <option value="G">G</option>
            <option value="PG">PG</option>
            <option value="PG-13">PG-13</option>
            <option value="R">R</option>
            <option value="NR">NR</option>
        </select>
    </div>
    <div>
        <label for="imdbLink">IMDB Link: </label>
        <input type="url" id="imdbLink">
    </div>
    <div>
        <label for="description">Description: </label>
        <input type="text" id="description">
    </div>
    <div>
        <label for="genre">Genre: </label>
        <input type="text" id="genre" placeholder="Action, Comedy...">
    </div>
    <div>
        <input type="button" id="addBtn" value="Add Movie">
    </div>
    <div id="error"></div>
</form>

<div class="footer">
    <div class="copyright">
        <p>Copyright &#169 2026 Sam Ragsdale</p>
    </div>
</body>
